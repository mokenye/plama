name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-check:
    name: Server — Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: plama
          POSTGRES_PASSWORD: plama
          POSTGRES_DB: plama_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql://plama:plama@localhost:5432/plama_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: cd server && npm ci
      - name: TypeScript compile
        run: cd server && npx tsc --noEmit
      - name: Run migrations
        run: cd server && npm run db:migrate
      - name: Run tests
        run: cd server && npm test

  client-check:
    name: Client — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: cd client && npm ci
      - name: Lint
        run: cd client && npm run lint
      - name: TypeScript compile
        run: cd client && npx tsc --noEmit
      - name: Build
        run: cd client && npm run build

  deploy-frontend:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [server-check, client-check, deploy-backend]  # Ensure backend is deployed before frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    name: Deploy to Northflank
    runs-on: ubuntu-latest
    needs: [server-check, client-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Northflank deployment
        run: |
          curl --fail -X POST \
            "https://api.northflank.com/v1/projects/sydney-tracker/services/plama/build" \
            -H "Authorization: Bearer ${{ secrets.NORTHFLANK_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'
            