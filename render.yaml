# Render.com deployment configuration
# Free tier: 750 hours/month

services:
  - type: web
    name: plama-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build && npm run db:migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard
      - key: REDIS_URL
        sync: false  # Set in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set in Render dashboard
      - key: CLIENT_URL
        sync: false  # Your Vercel URL