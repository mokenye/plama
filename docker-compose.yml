services:
  postgres:
    image: postgres:15-alpine
    container_name: plama-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: plama_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: plama-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: